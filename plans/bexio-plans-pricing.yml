description: >-
  bexio is sold as a per-company SaaS subscription in Swiss francs (CHF), tiered by
  feature set and included user seats, with a 30-day free trial and an annual-billing
  discount. The REST API is included with every paid subscription at no separate API
  fee - API access is a feature of the product, not a metered add-on. There is no
  usage-based per-call API pricing. Prices below reflect published 2026 CHF monthly
  rates and may change (bexio raised prices ~15-25% in early 2026).
notes: >-
  Verify current CHF rates and included-seat counts on the bexio packages-and-prices
  page during reconciliation. Annual billing is advertised with a CHF 120 discount.
  Some capabilities (document archive, bexio Pay) are add-ons. Payroll, POS, and
  extra users are priced separately.
sources:
- https://www.bexio.com/en-CH/packages-and-prices
- https://docs.bexio.com/
- https://developer.bexio.com/
