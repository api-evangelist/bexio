aid: bexio
url: https://raw.githubusercontent.com/api-evangelist/bexio/refs/heads/main/apis.yml
name: bexio
kind: company
description: bexio is a Swiss cloud business-management platform for SMBs and self-employed,
  covering accounting, invoicing (incl. Swiss QR-bill), contacts, sales orders, projects
  and time tracking, banking, purchasing, and payroll. The bexio REST API at
  api.bexio.com/2.0 exposes these modules over HTTPS with JSON, secured by OAuth 2.0
  (OpenID Connect) or Personal Access Tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Accounting
- ERP
- Invoicing
- SMB
- Switzerland
created: '2026-07-17'
modified: '2026-07-17'
specificationVersion: '0.19'
apis:
- aid: bexio:bexio-contacts-api
  name: bexio Contacts API
  tags:
  - Contacts
  - CRM
  - Address Book
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.bexio.com/
  baseURL: https://api.bexio.com/2.0
  properties:
  - url: https://docs.bexio.com/
    type: Documentation
  - url: https://docs.bexio.com/
    type: APIReference
  - url: openapi/bexio-openapi.yml
    type: OpenAPI
  description: Manage contacts, relations, groups, and sectors - the shared address
    book behind bexio quotes, orders, invoices, and projects. Scopes contact_show /
    contact_edit.
- aid: bexio:bexio-sales-order-management-api
  name: bexio Sales Order Management API
  tags:
  - Invoicing
  - Quotes
  - Orders
  - QR-Bill
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.bexio.com/
  baseURL: https://api.bexio.com/2.0
  properties:
  - url: https://docs.bexio.com/
    type: Documentation
  - url: openapi/bexio-openapi.yml
    type: OpenAPI
  description: Create and manage quotes (Offerte), orders (Auftrag), and invoices
    (Rechnung), including Swiss QR-bill (QR-Rechnung) PDF generation and payments.
    Scopes kb_offer_*, kb_order_*, kb_invoice_*.
