meters:
- name: subscription_seats
  description: Recurring per-company subscription and included/extra user seats, billed in CHF per month or year.
  unit: seats
  aggregation: sum
  dimensions:
  - company
  - package
- name: addons
  description: Optional add-ons (payroll, document archive, bexio Pay) billed on top of the base package.
  unit: addons
  aggregation: sum
  dimensions:
  - company
  - addon
principles:
- name: Visibility
  description: Track the active bexio package, seat count, and enabled add-ons per company against the CHF invoice.
- name: Allocation
  description: Map the bexio subscription to the internal cost center / entity that owns the finance function.
- name: Optimization
  description: Pick the lowest package tier that covers required modules; right-size user seats; prefer annual billing for the CHF 120 discount; disable unused add-ons.
- name: Accountability
  description: Assign an owner to review the bexio subscription and add-on charges at renewal.
