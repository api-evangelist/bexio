description: >-
  FinOps view of bexio spend. bexio bills a flat recurring SaaS subscription per
  company in Swiss francs (CHF), tiered by package (Basic / Advanced / Optima /
  Ultimate) and included user seats, with optional add-ons (extra users, payroll,
  document archive, bexio Pay). The REST API is included in the subscription -
  there is no per-call/metered API charge - so API cost management is really
  subscription-tier and seat management, plus watching add-on charges.
notes: >-
  Because API access is bundled (not usage-metered), the primary cost levers are
  choosing the right package tier, right-sizing user seats, and controlling add-ons.
  Verify CHF rates during reconciliation; bexio raised prices in early 2026.
