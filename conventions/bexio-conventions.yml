search:
  style: POST search endpoints
  notes: >-
    Most resources expose a POST .../search endpoint accepting an array of
    field/criteria/value filter objects (e.g. contacts, invoices, articles).
rate_limiting:
  signaled: true
  headers:
  - RateLimit-Limit
  - RateLimit-Remaining
  - RateLimit-Reset
  status_on_exceed: 429
  notes: >-
    bexio documents RateLimit response headers (section added April 2023). Exact
    per-plan quotas are not published in the docs.
