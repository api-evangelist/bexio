idempotency:
  supported: false
  notes: >-
    bexio does not document an idempotency-key mechanism. Retries of write
    operations are not deduplicated server-side; callers must guard against
    duplicate creation client-side.
request_tracing:
  request_id_header: null
  notes: No documented request-id / correlation header.
versioning:
  style: uri-path
  current: '2.0'
  ref: lifecycle/bexio-lifecycle.yml
error_envelope:
  format: ad-hoc-json
  shape: >-
