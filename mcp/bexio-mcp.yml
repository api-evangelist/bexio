notes: >-
  bexio does not operate an official hosted MCP server. A community MCP server
  (PromptPartner/bexio-mcp-server by Lukas Hertig) wraps the bexio REST API and
  exposes 300+ tools for invoices, contacts, projects, and time tracking; it runs
  locally (npx) as a pass-through to the API using a BEXIO_API_TOKEN and stores no
  data. Zapier and viaSocket also expose bexio as a hosted MCP endpoint via their
  connector platforms. The candidate tool list below is DERIVED from the OpenAPI
  operations in this repo as a governance reference.
servers:
- name: promptpartner-bexio-mcp-server
  origin: community
  transport: stdio
  install: npx @promptpartner/bexio-mcp-server
  repo: https://github.com/promptpartner/bexio-mcp-server
  env: [BEXIO_API_TOKEN]
  tool_count: 310
  passthrough: https://api.bexio.com/2.0
- name: zapier-bexio-mcp
  origin: platform
  transport: http
  url: https://zapier.com/mcp/bexio
